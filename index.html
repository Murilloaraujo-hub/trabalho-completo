<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Ephyra Finance</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  <!-- Ephyra CSS (order matters) -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/responsive.css">

  <style>
    /* Welcome & Login screens */
    #welcome-screen,#login-screen{position:fixed;inset:0;z-index:var(--z-max);background:var(--bg-primary);display:flex;align-items:center;justify-content:center}
    .welcome-container{text-align:center;padding:2rem;width:100%;max-width:480px}
    .hidden{display:none!important}
    /* Loading */
    #loading-screen{position:fixed;inset:0;z-index:99999;background:var(--bg-primary);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;transition:opacity .5s}
    #loading-screen.fade-out{opacity:0;pointer-events:none}
    .loader{width:48px;height:48px;border:4px solid var(--border-color);border-top-color:var(--color-primary);border-radius:50%;animation:spin .8s linear infinite}
  </style>
</head>
<body class="dark">
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div style="width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--color-primary),var(--color-secondary));display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:#fff">💰</div>
    <div class="loader"></div>
    <p class="text-muted text-sm">Carregando Ephyra Finance...</p>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Welcome Screen -->
  <div id="welcome-screen" class="hidden"></div>

  <!-- Login Screen -->
  <div id="login-screen" class="hidden"></div>

  <!-- ═══════════════════════════════ APP SHELL ═══════════════════════════════ -->
  <div id="app-shell" class="app-shell hidden">

    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay"></div>

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-icon">💰</div>
        <h1>Ephyra Finance</h1>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-item active" data-nav="dashboard"><i class="fas fa-th-large"></i><span>Dashboard</span></div>
        <div class="nav-item" data-nav="transacoes"><i class="fas fa-exchange-alt"></i><span>Transações</span></div>
        <div class="nav-item" data-nav="metas"><i class="fas fa-bullseye"></i><span>Metas</span></div>
        <div class="nav-item" data-nav="conquistas"><i class="fas fa-trophy"></i><span>Conquistas</span></div>
        <div class="nav-item" data-nav="perfil"><i class="fas fa-user"></i><span>Perfil</span></div>
        <div class="nav-item" data-nav="configuracoes"><i class="fas fa-cog"></i><span>Configurações</span></div>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-profile" data-nav="perfil">
          <img src="https://api.dicebear.com/7.x/initials/svg?seed=E" class="avatar avatar-sm" alt="Avatar">
          <div class="sidebar-profile-info">
            <div class="sidebar-profile-name">Usuário</div>
            <div class="sidebar-profile-level">Nível 1 • 0 XP</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- ── Main Content ── -->
    <main class="main-content">

      <!-- Top Bar -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="menu-toggle btn-icon"><i class="fas fa-bars"></i></button>
          <h2 id="topbar-title" class="topbar-title">Dashboard</h2>
        </div>
        <div class="topbar-right">
          <button class="btn btn-success btn-sm" onclick="App.showTxModal('receita')"><i class="fas fa-plus"></i><span class="hide-mobile"> Receita</span></button>
          <button class="btn btn-danger btn-sm" onclick="App.showTxModal('despesa')"><i class="fas fa-minus"></i><span class="hide-mobile"> Despesa</span></button>
        </div>
      </header>

      <!-- Pages -->
      <div id="page-dashboard" class="page active"></div>
      <div id="page-transacoes" class="page"></div>
      <div id="page-metas" class="page"></div>
      <div id="page-conquistas" class="page"></div>
      <div id="page-perfil" class="page"></div>
      <div id="page-configuracoes" class="page"></div>
    </main>

    <!-- Mobile Bottom Nav -->
    <nav class="bottom-nav">
      <div class="bottom-nav-item active" data-nav="dashboard"><i class="fas fa-th-large"></i><span>Início</span></div>
      <div class="bottom-nav-item" data-nav="transacoes"><i class="fas fa-exchange-alt"></i><span>Trans.</span></div>
      <div class="bottom-nav-item" data-nav="metas"><i class="fas fa-bullseye"></i><span>Metas</span></div>
      <div class="bottom-nav-item" data-nav="conquistas"><i class="fas fa-trophy"></i><span>Troféus</span></div>
      <div class="bottom-nav-item" data-nav="perfil"><i class="fas fa-user"></i><span>Perfil</span></div>
    </nav>
  </div>

  <!-- ═══════════════════════════════ GLOBAL MODAL ═══════════════════════════════ -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title"></h3>
        <button class="modal-close" onclick="App.closeModal()"><i class="fas fa-times"></i></button>
      </div>
      <div class="modal-body"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════ SCRIPTS ═══════════════════════════════ -->
  <script src="js/utilitarios.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/notificacoes.js"></script>
  <script src="js/validacoes.js"></script>
  <script src="js/categorias.js"></script>
  <script src="js/xp.js"></script>
  <script src="js/conquistas.js"></script>
  <script src="js/transacoes.js"></script>
  <script src="js/metas.js"></script>
  <script src="js/graficos.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/perfil.js"></script>
  <script src="js/configuracoes.js"></script>
  <script src="js/app.js"></script>

  <script>
    // Remove loading screen after init
    window.addEventListener('load', () => {
      setTimeout(() => {
        const ls = document.getElementById('loading-screen');
        ls.classList.add('fade-out');
        setTimeout(() => ls.remove(), 500);
      }, 600);
    });
  </script>
</body>
</html>
